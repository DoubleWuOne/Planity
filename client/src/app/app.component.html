<div class="app-root-bg">
	<header class="app-header">
	<nav class="navbar">
			<div class="nav-left">
				<a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
				<ng-container *ngIf="auth.isAuthenticated()">
					<a routerLink="/calendar" routerLinkActive="active">Calendar</a>
					<a routerLink="/tasks" routerLinkActive="active">Tasks</a>
					<a routerLink="/daily-routine" routerLinkActive="active">DailyRoutine</a>
					<a routerLink="/stats" routerLinkActive="active">Stats</a>
				</ng-container>
			</div>

		<div class="nav-right">
					<ng-container *ngIf="!auth.isAuthenticated()">
						<a routerLink="/login" routerLinkActive="active">Login</a>
						<a routerLink="/register" routerLinkActive="active">Register</a>
					</ng-container>
	      		<ng-container *ngIf="auth.isAuthenticated()">
	        <a (click)="onLogout()" routerLink="/logout">Logout</a>

	      		</ng-container>
		</div>
	</nav>
</header>

<main class="app-main">
	<router-outlet></router-outlet>
	</main>
		<footer class="site-footer dark">
			<div class="footer-inner">
				<div class="footer-col contact">
					<h4>Contact</h4>
					<form class="contact-form" (submit)="onContact($event)" aria-label="Contact form">
						<label class="visually-hidden" for="contact-name">Name</label>
						<div class="input-row">
							<input id="contact-name" name="name" type="text" placeholder="Your name" required />
							<input id="contact-email" name="email" type="email" placeholder="Your email" required />
						</div>
						<label class="visually-hidden" for="contact-message">Message</label>
						<textarea id="contact-message" name="message" placeholder="Message" rows="4" required></textarea>
						<div class="contact-actions">
							<button class="btn primary" type="submit"><i class="fas fa-paper-plane" aria-hidden="true"></i> Send message</button>
							<div *ngIf="contactSent" class="sent">Thanks — we received your message.</div>
						</div>
					</form>
				</div>

				<div class="footer-col links">
					<h4>Quick Links</h4>
					<a routerLink="/">Home</a>
					<a routerLink="/calendar">Calendar</a>
					<a routerLink="/tasks">Tasks</a>
				</div>

				<div class="footer-col social">
					<h4>Social</h4>
					<div class="social-links">
						<a href="#" aria-label="Facebook" class="social-btn" title="Facebook">
							<i class="fab fa-facebook-f" aria-hidden="true"></i>
						</a>
						<a href="#" aria-label="X" class="social-btn" title="X (Twitter)">
							<i class="fab fa-x-twitter" aria-hidden="true"></i>
						</a>
						<a href="#" aria-label="Discord" class="social-btn" title="Discord">
							<i class="fab fa-discord" aria-hidden="true"></i>
						</a>
						<a href="#" aria-label="LinkedIn" class="social-btn" title="LinkedIn">
							<i class="fab fa-linkedin-in" aria-hidden="true"></i>
						</a>
					</div>
					<div class="social-note small">Follow us for updates and tips</div>
				</div>
			</div>

				<div class="footer-bottom">© {{ currentYear }} Planity — All rights reserved</div>
			</footer>
		</div>
